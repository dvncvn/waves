<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Waves Preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      body {
        margin: 0;
        background: #efefef;
        color: #111;
      }
      .layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        min-height: 100vh;
      }
      .panel {
        background: #fff;
        border-right: 1px solid #ddd;
        padding: 16px;
        overflow: auto;
      }
      .panel h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      .panel p {
        margin: 0 0 16px;
        font-size: 12px;
        line-height: 1.45;
      }
      .field {
        margin: 0 0 12px;
      }
      .field label {
        display: block;
        font-size: 12px;
        margin-bottom: 6px;
      }
      .field input,
      .field button {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #bbb;
        background: #fff;
        padding: 7px 8px;
        font: inherit;
      }
      .field input[type="range"] {
        padding: 0;
        border: 0;
        accent-color: #111;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .triple {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }
      .section-title {
        margin: 14px 0 8px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #666;
      }
      .button-group {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .button-group.two {
        grid-template-columns: 1fr 1fr;
      }
      .button-group button {
        border: 1px solid #aaa;
        background: #f7f7f7;
        cursor: pointer;
      }
      .button-group button.active {
        background: #111;
        color: #fff;
        border-color: #111;
      }
      .slider-wrap {
        display: grid;
        grid-template-columns: 1fr 68px;
        align-items: center;
        gap: 8px;
      }
      .value-pill {
        border: 1px solid #bbb;
        background: #fafafa;
        text-align: center;
        padding: 5px 4px;
        font-size: 12px;
      }
      .viewer {
        padding: 20px;
        overflow: auto;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      .frame {
        background: #fff;
        border: 1px solid #ddd;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 100%;
      }
      .frame svg {
        display: block;
        width: 100%;
        height: auto;
      }
      .hint {
        font-size: 11px;
        color: #666;
        margin-top: 8px;
      }
      #status {
        font-size: 12px;
        margin-top: 8px;
      }
      .seed-actions button {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Waves Preview</h1>
        <p>Grid of filled waveform glyphs with controlled randomness.</p>

        <div class="field">
          <label>Preset</label>
          <div class="button-group" id="preset-group">
            <button type="button" data-preset="calm">calm</button>
            <button type="button" data-preset="balanced" class="active">balanced</button>
            <button type="button" data-preset="rough">rough</button>
          </div>
          <input id="preset" type="hidden" value="balanced" />
        </div>

        <div class="section-title">Seed</div>
        <div class="field">
          <label for="seed">Seed</label>
          <input id="seed" type="number" value="20260320" />
        </div>
        <div class="triple seed-actions">
          <button id="seed-prev" type="button">-1</button>
          <button id="randomize" type="button">random</button>
          <button id="seed-next" type="button">+1</button>
        </div>

        <div class="section-title">Grid</div>
        <div class="row">
          <div class="field">
            <label for="gridCols">columns</label>
            <div class="slider-wrap">
              <input id="gridCols" type="range" min="1" max="40" step="1" value="16" />
              <div class="value-pill" data-val-for="gridCols"></div>
            </div>
          </div>
          <div class="field">
            <label for="gridRows">rows</label>
            <div class="slider-wrap">
              <input id="gridRows" type="range" min="1" max="60" step="1" value="24" />
              <div class="value-pill" data-val-for="gridRows"></div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="tilePadding">padding</label>
            <div class="slider-wrap">
              <input id="tilePadding" type="range" min="0" max="60" step="1" value="4" />
              <div class="value-pill" data-val-for="tilePadding"></div>
            </div>
          </div>
          <div class="field">
            <label for="amp">amp</label>
            <div class="slider-wrap">
              <input id="amp" type="range" min="2" max="400" step="1" value="80" />
              <div class="value-pill" data-val-for="amp"></div>
            </div>
          </div>
        </div>

        <div class="section-title">Style</div>
        <div class="row">
          <div class="field">
            <label for="energy">energy</label>
            <div class="slider-wrap">
              <input id="energy" type="range" min="0" max="1" step="0.01" value="0.6" />
              <div class="value-pill" data-val-for="energy"></div>
            </div>
          </div>
          <div class="field">
            <label for="contrast">contrast</label>
            <div class="slider-wrap">
              <input id="contrast" type="range" min="0" max="1" step="0.01" value="0.6" />
              <div class="value-pill" data-val-for="contrast"></div>
            </div>
          </div>
        </div>
        <div class="field">
          <label for="texture">texture</label>
          <div class="slider-wrap">
            <input id="texture" type="range" min="0" max="1" step="0.01" value="0.5" />
            <div class="value-pill" data-val-for="texture"></div>
          </div>
        </div>

        <div class="section-title">Canvas</div>
        <div class="field">
          <label>Aspect ratio</label>
          <div class="button-group" id="aspect-group" style="grid-template-columns: repeat(5, 1fr);">
            <button type="button" data-aspect="1:1" class="active">1:1</button>
            <button type="button" data-aspect="4:3">4:3</button>
            <button type="button" data-aspect="3:4">3:4</button>
            <button type="button" data-aspect="16:9">16:9</button>
            <button type="button" data-aspect="9:16">9:16</button>
          </div>
        </div>
        <div class="field">
          <label for="canvasScale">scale</label>
          <div class="slider-wrap">
            <input id="canvasScale" type="range" min="400" max="4000" step="10" value="900" />
            <div class="value-pill" data-val-for="canvasScale"></div>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>width</label>
            <div class="value-pill" data-val-for="width" style="margin-top:0"></div>
            <input id="width" type="hidden" value="900" />
          </div>
          <div class="field">
            <label>height</label>
            <div class="value-pill" data-val-for="height" style="margin-top:0"></div>
            <input id="height" type="hidden" value="900" />
          </div>
        </div>

        <div id="status">Ready.</div>
        <div class="hint">Tip: use seed +/- to curate families, energy/contrast/texture for style.</div>
      </section>
      <section class="viewer">
        <div class="frame" id="svg-frame"></div>
      </section>
    </main>
    <script>
      const ids = [
        "preset",
        "seed",
        "gridCols",
        "gridRows",
        "tilePadding",
        "amp",
        "energy",
        "contrast",
        "texture",
        "width",
        "height"
      ];
      const els = Object.fromEntries(ids.map((id) => [id, document.getElementById(id)]));
      const frame = document.getElementById("svg-frame");
      const status = document.getElementById("status");
      const randomize = document.getElementById("randomize");
      const seedPrev = document.getElementById("seed-prev");
      const seedNext = document.getElementById("seed-next");
      const presetGroup = document.getElementById("preset-group");
      let timer = null;
      let presetValues = {};
      const keyMap = {
        seed: "seed",
        preset: null,
        gridCols: "gridCols",
        gridRows: "gridRows",
        tilePadding: "tilePadding",
        amp: "baseAmplitude",
        energy: "styleEnergy",
        contrast: "styleContrast",
        texture: "styleTexture",
        width: "width",
        height: "height"
      };

      function params() {
        const p = new URLSearchParams();
        p.set("mode", "grid");
        for (const id of ids) p.set(id, String(els[id].value));
        return p;
      }

      const aspectGroup = document.getElementById("aspect-group");
      const canvasScale = document.getElementById("canvasScale");
      let currentAspect = [1, 1];

      function setActive(group, selector, value) {
        for (const button of group.querySelectorAll(selector)) {
          button.classList.toggle("active", button.dataset.preset === value);
        }
      }

      function applyCanvasSize() {
        const scale = Number(canvasScale.value);
        const [aw, ah] = currentAspect;
        const max = Math.max(aw, ah);
        els.width.value = Math.round(scale * (aw / max));
        els.height.value = Math.round(scale * (ah / max));
        updateValuePills();
      }

      aspectGroup.addEventListener("click", (event) => {
        const btn = event.target.closest("button[data-aspect]");
        if (!btn) return;
        for (const b of aspectGroup.querySelectorAll("button")) b.classList.remove("active");
        btn.classList.add("active");
        const [w, h] = btn.dataset.aspect.split(":").map(Number);
        currentAspect = [w, h];
        applyCanvasSize();
        scheduleRender();
      });

      canvasScale.addEventListener("input", () => {
        applyCanvasSize();
        scheduleRender();
      });
      canvasScale.addEventListener("change", () => {
        applyCanvasSize();
        scheduleRender();
      });

      function updateValuePills() {
        for (const pill of document.querySelectorAll("[data-val-for]")) {
          const id = pill.getAttribute("data-val-for");
          const el = els[id] || document.getElementById(id);
          const val = el?.value;
          if (val !== undefined) pill.textContent = val;
        }
      }

      async function render() {
        status.textContent = "Rendering...";
        try {
          const response = await fetch(`/api/svg?${params().toString()}`);
          const svg = await response.text();
          frame.innerHTML = svg;
          status.textContent = "Rendered.";
        } catch (error) {
          status.textContent = `Error: ${error}`;
        }
      }

      async function applyConstraints() {
        try {
          const presetsResponse = await fetch("/api/presets");
          const presetData = await presetsResponse.json();
          presetValues = presetData?.values || {};
          updateValuePills();
        } catch {
          // fallback
        }
      }

      function scheduleRender() {
        clearTimeout(timer);
        timer = setTimeout(render, 120);
      }

      for (const id of ids) {
        els[id].addEventListener("input", () => {
          updateValuePills();
          scheduleRender();
        });
        els[id].addEventListener("change", () => {
          updateValuePills();
          scheduleRender();
        });
      }

      presetGroup.addEventListener("click", (event) => {
        const btn = event.target.closest("button[data-preset]");
        if (!btn) return;
        els.preset.value = btn.dataset.preset;
        setActive(presetGroup, "button[data-preset]", els.preset.value);
        const preset = presetValues?.[els.preset.value];
        if (!preset) return;
        if (preset.gridCols !== undefined) els.gridCols.value = preset.gridCols;
        if (preset.gridRows !== undefined) els.gridRows.value = preset.gridRows;
        if (preset.tilePadding !== undefined) els.tilePadding.value = preset.tilePadding;
        if (preset.baseAmplitude !== undefined) els.amp.value = preset.baseAmplitude;
        if (preset.styleEnergy !== undefined) els.energy.value = preset.styleEnergy;
        if (preset.styleContrast !== undefined) els.contrast.value = preset.styleContrast;
        if (preset.styleTexture !== undefined) els.texture.value = preset.styleTexture;
        updateValuePills();
        render();
      });

      randomize.addEventListener("click", () => {
        els.seed.value = Math.floor(Math.random() * 2000000000) + 1;
        updateValuePills();
        render();
      });

      seedPrev.addEventListener("click", () => {
        const current = Number(els.seed.value) || 1;
        els.seed.value = Math.max(1, current - 1);
        updateValuePills();
        render();
      });

      seedNext.addEventListener("click", () => {
        const current = Number(els.seed.value) || 1;
        els.seed.value = current + 1;
        updateValuePills();
        render();
      });

      applyConstraints().then(() => {
        setActive(presetGroup, "button[data-preset]", els.preset.value);
        updateValuePills();
        render();
      });
    </script>
  </body>
</html>
